<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Responsibilities Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .admin-panel {
            background: #f8f9fa;
            padding: 20px;
            border-bottom: 3px solid #dee2e6;
        }

        .password-input {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
        }

        .password-input input {
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 10px;
            width: 200px;
        }

        .password-input button {
            padding: 12px 30px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        .password-input button:hover {
            background: #3d9bf5;
        }

        .status {
            text-align: center;
            padding: 15px;
            font-weight: bold;
            font-size: 18px;
        }

        .status.admin-active {
            color: #28a745;
            background: #d4edda;
        }

        .status.locked {
            color: #dc3545;
            background: #f8d7da;
        }

        .tasks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 30px;
        }

        .task-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            border-left: 5px solid #4facfe;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .task-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .task-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .task-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            font-weight: bold;
        }

        .trash { background: #ff6b6b; }
        .mopping { background: #4ecdc4; }
        .bathroom { background: #45b7d1; }
        .kitchen { background: #f9ca24; }

        .task-title {
            font-size: 1.4em;
            font-weight: bold;
            color: #333;
        }

        .current-user {
            font-size: 1.2em;
            font-weight: bold;
            color: #28a745;
            margin-bottom: 10px;
        }

        .next-user {
            color: #6c757d;
            font-style: italic;
        }

        .completion-status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
        }

        .completed {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }

        .pending {
            background: #fff3cd;
            color: #856404;
            border: 2px solid #ffeaa7;
        }

        .admin-controls {
            background: #e9ecef;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .admin-controls.active {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .control-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 150px;
        }

        .btn-complete {
            background: #28a745;
            color: white;
        }

        .btn-complete:hover {
            background: #218838;
            transform: scale(1.05);
        }

        .btn-reset {
            background: #ffc107;
            color: #212529;
        }

        .btn-reset:hover {
            background: #e0a800;
            transform: scale(1.05);
        }

        .submit-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            text-align: center;
        }

        .submit-btn {
            padding: 20px 50px;
            font-size: 20px;
            font-weight: bold;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(255,107,107,0.4);
        }

        .submit-btn:hover:not(:disabled) {
            background: #ff5252;
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255,107,107,0.6);
        }

        .submit-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .locked-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            color: white;
            font-size: 24px;
            text-align: center;
            padding: 20px;
        }

        @media (max-width: 768px) {
            .tasks-grid {
                grid-template-columns: 1fr;
                padding: 20px;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .control-buttons {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏠 House Responsibilities Tracker</h1>
            <p>Track and manage household duties efficiently</p>
        </div>

        <div class="admin-panel">
            <div class="password-input">
                <input type="password" id="adminPassword" placeholder="Admin Password">
                <button onclick="toggleAdminMode()">Admin Login</button>
            </div>
            <div id="adminStatus" class="status locked">🔒 Admin Mode: Locked</div>
        </div>

        <div class="tasks-grid" id="tasksGrid">
            <!-- Tasks will be populated by JavaScript -->
        </div>

        <div class="admin-controls" id="adminControls">
            <h3>Admin Controls</h3>
            <div id="controlButtons" class="control-buttons"></div>
        </div>

        <div class="submit-section">
            <button class="submit-btn" id="submitBtn" onclick="submitUpdates()" disabled>💾 Update All Changes</button>
        </div>
    </div>

    <script>
        // House responsibilities sequences
        const responsibilities = {
            trash: ['Kanchan', 'Uday', 'Ankit', 'Shubham', 'Ravalika', 'Shivani', 'Kanchan'],
            mopping: ['Ravalika', 'Ankit', 'Uday', 'Kanchan', 'Shivani', 'Shubham'],
            bathroom: ['Uday', 'Kanchan', 'Shivani', 'Shubham', 'Ravalika', 'Ankit'],
            kitchen: ['Kanchan', 'Shivani', 'Uday', 'Ankit', 'Shubham', 'Ravalika']
        };

        // State management
        let currentIndices = JSON.parse(localStorage.getItem('houseTrackerIndices')) || {
            trash: 0,
            mopping: 0,
            bathroom: 0,
            kitchen: 0
        };

        let isAdminMode = false;
        const ADMIN_PASSWORD = '1234';
        let pendingUpdates = {};

        // Task configuration
        const taskConfig = [
            { id: 'trash', title: '🗑️ Trash', iconClass: 'trash' },
            { id: 'mopping', title: '🧹 Mopping', iconClass: 'mopping' },
            { id: 'bathroom', title: '🚿 Bathroom', iconClass: 'bathroom' },
            { id: 'kitchen', title: '🍽️ Kitchen', iconClass: 'kitchen' }
        ];

        function init() {
            renderTasks();
            updateAdminStatus();
        }

        function toggleAdminMode() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                isAdminMode = true;
                document.getElementById('adminStatus').textContent = '✅ Admin Mode: Active';
                document.getElementById('adminStatus').className = 'status admin-active';
                document.getElementById('adminPassword').value = '';
                showAdminControls();
            } else {
                alert('❌ Incorrect Password!');
            }
        }

        function showAdminControls() {
            document.getElementById('adminControls').classList.add('active');
            renderControlButtons();
        }

        function renderTasks() {
            const tasksGrid = document.getElementById('tasksGrid');
            tasksGrid.innerHTML = '';

            taskConfig.forEach(task => {
                const currentIndex = currentIndices[task.id];
                const currentUser = responsibilities[task.id][currentIndex];
                const nextIndex = (currentIndex + 1) % responsibilities[task.id].length;
                const nextUser = responsibilities[task.id][nextIndex];

                const taskCard = document.createElement('div');
                taskCard.className = 'task-card';
                taskCard.innerHTML = `
                    <div class="task-header">
                        <div class="task-icon ${task.iconClass}">${task.title.split('')[0]}</div>
                        <div>
                            <div class="task-title">${task.title}</div>
                        </div>
                    </div>
                    <div class="current-user">👤 Current: ${currentUser}</div>
                    <div class="next-user">⏭️ Next: ${nextUser}</div>
                    <div class="completion-status ${currentIndex === 0 ? 'pending' : 'completed'}">
                        ${currentIndex === 0 ? '⏳ Pending' : '✅ Completed'}
                    </div>
                `;
                tasksGrid.appendChild(taskCard);
            });
        }

        function renderControlButtons() {
            const controlButtons = document.getElementById('controlButtons');
            controlButtons.innerHTML = '';

            taskConfig.forEach(task => {
                const buttonGroup = document.createElement('div');
                buttonGroup.style.display = 'flex';
                buttonGroup.style.gap = '10px';

                const completeBtn = document.createElement('button');
                completeBtn.className = 'btn btn-complete';
                completeBtn.textContent = `Mark ${task.title} Complete`;
                completeBtn.onclick = () => markComplete(task.id);

                const resetBtn = document.createElement('button');
                resetBtn.className = 'btn btn-reset';
                resetBtn.textContent = `Reset ${task.title}`;
                resetBtn.onclick = () => resetTask(task.id);

                buttonGroup.appendChild(completeBtn);
                buttonGroup.appendChild(resetBtn);
                controlButtons.appendChild(buttonGroup);
            });

            updateSubmitButton();
        }

        function markComplete(taskId) {
            if (!pendingUpdates[taskId]) {
                pendingUpdates[taskId] = 'complete';
                updateSubmitButton();
            }
        }

        function resetTask(taskId) {
            if (!pendingUpdates[taskId]) {
                pendingUpdates[taskId] = 'reset';
                updateSubmitButton();
            }
        }

        function updateSubmitButton() {
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = Object.keys(pendingUpdates).length === 0;
            submitBtn.textContent = `💾 Update ${Object.keys(pendingUpdates).length} Changes`;
        }

        function submitUpdates() {
            if (Object.keys(pendingUpdates).length === 0) return;

            // Apply updates
            Object.keys(pendingUpdates).forEach(taskId => {
                if (pendingUpdates[taskId] === 'complete') {
                    currentIndices[taskId] = (currentIndices[taskId] + 1) % responsibilities[taskId].length;
                } else if (pendingUpdates[taskId] === 'reset') {
                    currentIndices[taskId] = 0;
                }
            });

            // Save to localStorage
            localStorage.setItem('houseTrackerIndices', JSON.stringify(currentIndices));

            // Clear pending updates
            pendingUpdates = {};
            
            // Refresh display
            renderTasks();
            renderControlButtons();
            
            alert('✅ All changes saved successfully!');
        }

        function updateAdminStatus() {
            const statusEl = document.getElementById('adminStatus');
            if (isAdminMode) {
                statusEl.textContent = '✅ Admin Mode: Active';
                statusEl.className = 'status admin-active';
            } else {
                statusEl.textContent = '🔒 Admin Mode: Locked';
                statusEl.className = 'status locked';
            }
        }

        // Initialize app
        init();
    </script>
</body>
</html>
